name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Inject Custom App Icon
        run: |
          # Overwrite default Flutter icons automatically before compilation
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp lib/icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp lib/icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp lib/icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp lib/icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp lib/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalStream-RenanteFullo-APK
          path: build/app/outputs/flutter-apk/app-release.apk
